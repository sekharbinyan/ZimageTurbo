<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binyan Studios — Z Image Turbo</title>
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="/static/logo.svg" alt="" class="brand-logo" />
      <div>
        <p class="brand-label">Binyan Studios</p>
        <h1>Z Image Turbo</h1>
      </div>
    </div>
    <div class="status-wrap">
      <span id="connection-badge" class="badge">Checking…</span>
      <p id="connection-detail" class="connection-detail"></p>
    </div>
  </header>

  <main class="workspace">
    <section class="card controls">
      <div class="mode-switch">
        <button type="button" class="mode-btn active" data-mode="txt2img">Text to Image</button>
        <button type="button" class="mode-btn" data-mode="img2img">Image to Image</button>
      </div>

      <form id="generate-form">
        <div class="form-block hidden" id="image-block">
          <div class="label-row">
            <label for="image">Source image</label>
            <button type="button" id="clear-image" class="link-btn hidden">Remove</button>
          </div>
          <label class="upload-box" id="upload-box">
            <input type="file" id="image" name="image" accept="image/*" />
            <div id="upload-placeholder">
              <strong>Click or drop an image</strong>
              <span>PNG, JPG, WEBP</span>
            </div>
            <img id="preview" alt="Preview" class="hidden" />
          </label>
        </div>

        <div class="form-block">
          <div class="label-row">
            <label for="prompt">Prompt</label>
            <select id="preset-select" class="select-sm">
              <option value="">Preset…</option>
              <option value="Latina female with thick wavy hair, harbor boats and pastel houses behind. Breezy seaside light, warm tones, cinematic close-up.">Cinematic portrait</option>
              <option value="Futuristic city skyline at golden hour, ultra detailed, architectural photography, dramatic clouds.">Futuristic skyline</option>
              <option value="Product photo of a luxury watch on marble surface, studio lighting, shallow depth of field, commercial quality.">Product shot</option>
              <option value="Fantasy landscape with floating islands, waterfalls, ethereal mist, concept art style, vibrant colors.">Fantasy landscape</option>
            </select>
          </div>
          <textarea id="prompt" name="prompt" rows="5" required placeholder="Describe the image you want to create…">Latina female with thick wavy hair, harbor boats and pastel houses behind. Breezy seaside light, warm tones, cinematic close-up.</textarea>
        </div>

        <div class="form-block" id="size-block">
          <label>Output size</label>
          <div class="size-controls">
            <label class="size-field">W<input type="number" id="width" name="width" value="1024" min="256" max="2048" step="64" /></label>
            <label class="size-field">H<input type="number" id="height" name="height" value="1024" min="256" max="2048" step="64" /></label>
            <div class="chip-row">
              <button type="button" class="chip" data-w="1024" data-h="1024">1:1</button>
              <button type="button" class="chip" data-w="1216" data-h="832">3:2</button>
              <button type="button" class="chip" data-w="832" data-h="1216">2:3</button>
              <button type="button" class="chip" data-w="1344" data-h="768">16:9</button>
            </div>
          </div>
        </div>

        <details class="advanced">
          <summary>Advanced</summary>
          <div class="advanced-grid">
            <label class="field">Steps<input type="number" id="steps" name="steps" value="8" min="1" max="50" /></label>
            <label class="field">CFG<input type="number" id="cfg" name="cfg" value="1" min="0" max="20" step="0.1" /></label>
            <label class="field hidden" id="denoise-block">Denoise
              <div class="range-row">
                <input type="range" id="denoise" name="denoise" value="0.75" min="0.01" max="1" step="0.01" />
                <span id="denoise-value">0.75</span>
              </div>
            </label>
            <label class="field">Seed
              <div class="seed-row">
                <input type="number" id="seed" name="seed" placeholder="Random" />
                <button type="button" id="random-seed" class="mini-btn">Random</button>
              </div>
            </label>
          </div>
        </details>

        <div class="action-row">
          <button type="submit" id="submit-btn" class="btn-primary">
            <span id="btn-text">Generate</span>
            <span id="btn-spinner" class="spinner hidden"></span>
          </button>
          <button type="button" id="regenerate-btn" class="btn-secondary" disabled>Regenerate</button>
        </div>
        <p id="status" class="form-status" aria-live="polite"></p>
      </form>
    </section>

    <section class="card output">
      <div class="label-row">
        <h2>Output</h2>
        <div class="output-actions">
          <button type="button" id="copy-seed" class="link-btn hidden">Copy seed</button>
          <a id="download-link" class="link-btn hidden" download="binyan-z-image-turbo.png">Download</a>
        </div>
      </div>

      <div id="output-empty" class="output-empty">
        <img src="/static/logo.svg" alt="" />
        <p>Your result will show here</p>
        <small>First generation may take longer while ComfyUI loads models</small>
      </div>

      <div id="output-loading" class="output-loading hidden">
        <div class="spinner large"></div>
        <p>Generating on GPU server…</p>
        <span id="elapsed">0s</span>
      </div>

      <figure id="output-result" class="output-result hidden">
        <img id="result-image" alt="Generated result" />
        <figcaption id="result-meta"></figcaption>
      </figure>

      <div id="history-block" class="history-block hidden">
        <div class="label-row">
          <h3>Recent</h3>
          <button type="button" id="clear-history" class="link-btn">Clear</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 <strong>Binyan Studios</strong> · Z Image Turbo</p>
  </footer>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
